<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة التحكم - Mohamed Eljoker</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111827;
    color:white;
}
.admin-header{
    background:#000;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:cyan;
    box-shadow:0 0 20px cyan;
}
#adminPanel{
    max-width:1200px;
    margin:30px auto;
    padding:25px;
    background:#1f2937;
    border-radius:15px;
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    display:none;
}
.loading{
    text-align:center;
    margin-top:100px;
    color:cyan;
    font-size:20px;
    animation: blink 1.5s infinite alternate;
}
@keyframes blink {
  from { opacity:0.5; }
  to { opacity:1; }
}
.logout-btn{
    display:none;
    position:fixed;
    top:15px;
    left:15px;
    padding:5px 10px;
    font-size:14px;
    border:none;
    border-radius:5px;
    background:red;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="admin-header">👑 لوحة تحكم Mohamed Eljoker</div>

<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>

<div id="loading" class="loading">جارِ التحقق من حسابك...</div>

<div id="adminPanel">
  <h2>مرحبا بالأدمن 👑</h2>
  <p>لوحة التحكم مفتوحة بنجاح!</p>
  <!-- حط هنا بقية عناصر التحكم اللي انت عايزها -->
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCi7QFutixJEkVlc21-k2ELnkEceqML-w",
  authDomain: "mohamedeljokerweb.firebaseapp.com",
  projectId: "mohamedeljokerweb",
  storageBucket: "mohamedeljokerweb.firebasestorage.app",
  messagingSenderId: "190296400698",
  appId: "1:190296400698:web:517c0daf88e74e1c4b6603"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// الإيميل المعتمد كأدمن
const adminEmail = "mhmdbdaltwabalsdawyaljwkr@gmail.com";

const loading = document.getElementById("loading");
const adminPanel = document.getElementById("adminPanel");
const logoutBtn = document.getElementById("logoutBtn");

// حماية الأدمن
onAuthStateChanged(auth, (user) => {
  if (!user) {
    // لو مش مسجل دخول → اودي لصفحة تسجيل الدخول
    window.location.href = "login.html";
    return;
  }

  // لو المستخدم موجود
  if (user.email === adminEmail) {
    // لو هو الأدمن
    loading.style.display = "none";
    adminPanel.style.display = "block";
    logoutBtn.style.display = "block";
  } else {
    // لو مش الأدمن
    window.location.href = "unauthorized.html";
  }
});

// تسجيل الخروج
logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});
</script>

</body>
</html>
