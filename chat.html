<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 دردشة المنصة - Mohamed Eljoker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  margin: 0;
  padding: 20px;
}
#chat-box {
  background: #1a1a2e;
  padding: 15px;
  height: 450px;
  overflow-y: auto;
  border-radius: 10px;
  box-shadow: 0 0 20px cyan;
  display: flex;
  flex-direction: column;
}
.message {
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 10px;
  max-width: 75%;
  word-wrap: break-word;
  position: relative;
}
.owner {
  background: cyan;
  color: #000;
  align-self: flex-end;
  box-shadow: 0 0 10px cyan;
}
.user {
  background: #2c2c54;
  align-self: flex-start;
  color: white;
}
.timestamp {
  display: block;
  font-size: 11px;
  opacity: 0.7;
  margin-top: 4px;
  text-align: right;
}
.delete-btn {
  background: transparent;
  border: none;
  color: red;
  font-weight: bold;
  cursor: pointer;
  position: absolute;
  top: 5px;
  left: 8px;
}
.logout-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: cyan;
  color: #000;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px cyan;
}
.clear-btn {
  background: red;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h2>💬 دردشة المنصة - Mohamed Eljoker</h2>
<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
<div id="owner-controls"></div>
<div id="chat-box"></div>
<div style="margin-top:10px;">
  <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا" style="width:80%;padding:10px;border-radius:8px;border:none;background:#1a1a2e;color:white;">
  <button id="send-btn" style="padding:10px 15px;border:none;border-radius:8px;background:cyan;color:black;font-weight:bold;cursor:pointer;">إرسال</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, deleteDoc, doc,
  query, orderBy, onSnapshot, getDocs 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { 
  getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCi7QFutixJEkVlc21-k2ELnkEceqML-w",
  authDomain: "mohamedeljokerweb.firebaseapp.com",
  projectId: "mohamedeljokerweb",
  storageBucket: "mohamedeljokerweb.appspot.com",
  messagingSenderId: "190296400698",
  appId: "1:190296400698:web:517c0daf88e74e1c4b6603"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ownerEmail = "mhmdbdaltwabalsdawyaljwkr@gmail.com";
let currentUserEmail = null;
let isOwnerNow = false;

const chatBox = document.getElementById("chat-box");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const logoutBtn = document.getElementById("logoutBtn");
const ownerControls = document.getElementById("owner-controls");

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUserEmail = user.email;
    isOwnerNow = user.email === ownerEmail;
    startChat();
  }
});

function startChat() {
  // زر حذف كل الرسائل للأدمن فقط
  if (isOwnerNow) {
    const clearBtn = document.createElement("button");
    clearBtn.textContent = "🗑️ حذف كل الرسائل";
    clearBtn.classList.add("clear-btn");
    clearBtn.onclick = async () => {
      if (confirm("هل أنت متأكد أنك تريد حذف كل الرسائل؟")) {
        const snapshot = await getDocs(collection(db, "chatMessages"));
        snapshot.forEach(async (docItem) => {
          await deleteDoc(docItem.ref);
        });
      }
    };
    ownerControls.appendChild(clearBtn);
  }

  sendBtn.addEventListener("click", async () => {
    const text = msgInput.value.trim();
    if (text !== "") {
      await addDoc(collection(db, "chatMessages"), {
        sender: currentUserEmail,
        message: text,
        timestamp: Date.now()
      });
      msgInput.value = "";
    }
  });

  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  const q = query(collection(db, "chatMessages"), orderBy("timestamp"));
  onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const msgDiv = document.createElement("div");
      const isMe = data.sender === currentUserEmail;
      const isOwnerMsg = data.sender === ownerEmail;

      msgDiv.classList.add("message");
      msgDiv.classList.add(isOwnerMsg ? "owner" : "user");

      msgDiv.innerHTML = `
        <strong>${isMe ? "أنت" : (isOwnerMsg ? "الأدمن" : "مستخدم")}:</strong> ${data.message}
        <span class="timestamp">${formatTime(data.timestamp)}</span>
      `;

      // زر الحذف: المستخدم لرسالته فقط / الأدمن لأي رسالة
      if (isMe || isOwnerNow) {
        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.classList.add("delete-btn");
        delBtn.onclick = async () => {
          if (confirm("هل تريد حذف هذه الرسالة؟")) {
            await deleteDoc(doc(db, "chatMessages", docSnap.id));
          }
        };
        msgDiv.appendChild(delBtn);
      }

      chatBox.appendChild(msgDiv);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function formatTime(ts) {
  const date = new Date(ts);
  const hours = date.getHours().toString().padStart(2, "0");
  const minutes = date.getMinutes().toString().padStart(2, "0");
  return `${hours}:${minutes}`;
}
</script>

</body>
</html>
