<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دردشة المنصة - Mohamed Eljoker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
  margin: 0;
  padding: 20px;
}
#chat-box {
  background: #1a1a2e;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 0 15px cyan;
  display: flex;
  flex-direction: column;
}
.message {
  padding: 8px 12px;
  margin: 5px 0;
  border-radius: 10px;
  max-width: 75%;
  word-wrap: break-word;
  position: relative;
}
.owner {
  background: cyan;
  color: #000;
  align-self: flex-end;
  box-shadow: 0 0 10px cyan;
}
.user {
  background: #2c2c54;
  align-self: flex-start;
  color: white;
}
.timestamp {
  display: block;
  font-size: 11px;
  opacity: 0.7;
  margin-top: 3px;
  text-align: right;
}
.delete-btn {
  background: transparent;
  border: none;
  color: red;
  font-weight: bold;
  margin-right: 8px;
  cursor: pointer;
}
.logout-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: cyan;
  color: #000;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px cyan;
}
.clear-btn {
  background: red;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h2>💬 دردشة المنصة - Mohamed Eljoker</h2>
<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
<div id="owner-controls"></div>
<div id="chat-box"></div>
<input type="text" id="msg-input" placeholder="اكتب رسالتك هنا">
<button id="send-btn">إرسال</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, deleteDoc, doc,
  query, orderBy, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { 
  getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCi7QFutixJEkVlc21-k2ELnkEceqML-w",
  authDomain: "mohamedeljokerweb.firebaseapp.com",
  projectId: "mohamedeljokerweb",
  storageBucket: "mohamedeljokerweb.firebasestorage.app",
  messagingSenderId: "190296400698",
  appId: "1:190296400698:web:517c0daf88e74e1c4b6603"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ownerEmail = "mhmdbdaltwabalsdawy@gmail.com";
let currentUserEmail = null;
let isOwnerNow = false;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUserEmail = user.email;
    isOwnerNow = user.email === ownerEmail;
    startChat();
  }
});

function startChat(){
  const chatBox = document.getElementById("chat-box");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const logoutBtn = document.getElementById("logoutBtn");
  const ownerControls = document.getElementById("owner-controls");

  // زر حذف كل الرسائل (للمالك فقط)
  if (isOwnerNow) {
    const clearBtn = document.createElement("button");
    clearBtn.textContent = "حذف كل الرسائل";
    clearBtn.classList.add("clear-btn");
    clearBtn.onclick = async () => {
      const snapshot = await getDocs(collection(db, "chatMessages"));
      snapshot.forEach(async (docItem) => {
        await deleteDoc(docItem.ref);
      });
    };
    ownerControls.appendChild(clearBtn);
  }

  sendBtn.addEventListener("click", async () => {
    const text = msgInput.value.trim();
    if (text !== "") {
      await addDoc(collection(db, "chatMessages"), {
        sender: currentUserEmail,
        message: text,
        timestamp: Date.now()
      });
      msgInput.value = "";
    }
  });

  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  function formatTime(ts) {
    const date = new Date(ts);
    const hours = date.getHours() % 12 || 12;
    const minutes = date.getMinutes().toString().padStart(2, "0");
    const ampm = date.getHours() >= 12 ? "م" : "ص";
    return `${hours}:${minutes} ${ampm}`;
  }

  const q = query(collection(db, "chatMessages"), orderBy("timestamp"));
  onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const div = document.createElement("div");
      div.classList.add("message");

      const isMe = data.sender === currentUserEmail;
      const messageOwner = data.sender === ownerEmail;

      div.classList.add(messageOwner ? "owner" : "user");

      div.innerHTML = `
        <strong>${isMe ? "أنت" : "مستخدم"}:</strong> ${data.message}
        <span class="timestamp">${formatTime(data.timestamp)}</span>
      `;

      // حذف لو أنا صاحب الرسالة أو أنا المالك
      if (isMe || isOwnerNow) {
        const delBtn = document.createElement("button");
        delBtn.textContent = "حذف";
        delBtn.classList.add("delete-btn");
        delBtn.onclick = async () => {
          await deleteDoc(doc(db, "chatMessages", docSnap.id));
        };
        div.appendChild(delBtn);
      }

      chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}
</script>

</body>
</html>
