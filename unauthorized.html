<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 دردشة المنصة - Mohamed Eljoker</title>

<style>
body {
  font-family:  Tajawal , sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
  color: white;
  margin: 0;
  padding: 20px;
}
h2 {
  text-align: center;
  color: cyan;
  text-shadow: 0 0 10px cyan;
}
#chat-box {
  background: #1a1a2e;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 0 15px cyan;
  display: flex;
  flex-direction: column;
}
.message {
  padding: 8px 12px;
  margin: 5px 0;
  border-radius: 10px;
  max-width: 75%;
  word-wrap: break-word;
  position: relative;
}
.owner {
  background: linear-gradient(90deg,#06b6d4,#3b82f6);
  color: #fff;
  align-self: flex-end;
  box-shadow: 0 0 10px cyan;
}
.user {
  background: #2c2c54;
  align-self: flex-start;
  color: white;
}
.timestamp {
  display: block;
  font-size: 11px;
  opacity: 0.7;
  margin-top: 3px;
  text-align: right;
}
.delete-btn {
  background: transparent;
  border: none;
  color: #ff4d4d;
  font-weight: bold;
  margin-right: 8px;
  cursor: pointer;
  float: left;
}
.delete-btn:hover {
  color: #ff7b7b;
}
.logout-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: linear-gradient(90deg,#06b6d4,#3b82f6);
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px cyan;
  transition: 0.3s;
}
.logout-btn:hover {
  transform: scale(1.05);
}
.clear-btn {
  background: red;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
  box-shadow: 0 0 10px rgba(255,0,0,0.4);
}
input {
  width: 80%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-right: 5px;
}
#send-btn {
  padding: 10px 15px;
  background: cyan;
  color: #000;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
#send-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px cyan;
}
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body>

<h2>💬 دردشة المنصة - Mohamed Eljoker</h2>
<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
<div id="owner-controls" style="text-align:center;"></div>
<div id="chat-box"></div>
<div class="controls">
  <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا">
  <button id="send-btn">إرسال</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, deleteDoc, doc,
  query, orderBy, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { 
  getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// إعدادات Firebase الصحيحة
const firebaseConfig = {
  apiKey: "AIzaSyC3XRTBWSV46_dBJoJE5HDS-sUo_UaU4as",
  authDomain: "mohamed-el-joker.firebaseapp.com",
  projectId: "mohamed-el-joker",
  storageBucket: "mohamed-el-joker.firebasestorage.app",
  messagingSenderId: "402384603429",
  appId: "1:402384603429:web:0e5ff5b44cf1ba066ab2cc",
  measurementId: "G-RC8NQSE4Q4"
};
  
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ownerEmail = "mhmdbdaltwabalsdawyaljwkr@gmail.com"; // إيميل الأدمن
let currentUserEmail = null;
let isOwnerNow = false;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUserEmail = user.email;
    isOwnerNow = user.email === ownerEmail;
    startChat();
  }
});

function startChat(){
  const chatBox = document.getElementById("chat-box");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const logoutBtn = document.getElementById("logoutBtn");
  const ownerControls = document.getElementById("owner-controls");

  // زر حذف كل الرسائل (للأدمن فقط)
  if (isOwnerNow) {
    const clearBtn = document.createElement("button");
    clearBtn.textContent = "🗑️ حذف كل الرسائل";
    clearBtn.classList.add("clear-btn");
    clearBtn.onclick = async () => {
      if(confirm("هل أنت متأكد من حذف جميع الرسائل؟")){
        const snapshot = await getDocs(collection(db, "chatMessages"));
        snapshot.forEach(async (docItem) => {
          await deleteDoc(docItem.ref);
        });
        alert("تم حذف جميع الرسائل ✅");
      }
    };
    ownerControls.appendChild(clearBtn);
  }

  // إرسال الرسالة
  sendBtn.addEventListener("click", async () => {
    const text = msgInput.value.trim();
    if (text !== "") {
      await addDoc(collection(db, "chatMessages"), {
        sender: currentUserEmail,
        message: text,
        timestamp: Date.now()
      });
      msgInput.value = "";
    }
  });

  // تسجيل خروج
  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });

  // تنسيق الوقت
  function formatTime(ts) {
    const date = new Date(ts);
    const hours = date.getHours() % 12 || 12;
    const minutes = date.getMinutes().toString().padStart(2, "0");
    const ampm = date.getHours() >= 12 ? "م" : "ص";
    return `${hours}:${minutes} ${ampm}`;
  }

  // عرض الرسائل لحظيًا
  const q = query(collection(db, "chatMessages"), orderBy("timestamp"));
  onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const div = document.createElement("div");
      div.classList.add("message");

      const isMe = data.sender === currentUserEmail;
      const isOwnerMessage = data.sender === ownerEmail;

      div.classList.add(isMe ? "owner" : "user");
      div.innerHTML = `
        <strong>${isMe ? "أنت" : isOwnerMessage ? "الأدمن" : "مستخدم"}:</strong> ${data.message}
        <span class="timestamp">${formatTime(data.timestamp)}</span>
      `;

      // زر حذف الرسالة (لصاحبها أو للأدمن)
      if (isMe || isOwnerNow) {
        const delBtn = document.createElement("button");
        delBtn.textContent = "❌";
        delBtn.classList.add("delete-btn");
        delBtn.onclick = async () => {
          if(confirm("هل تريد حذف هذه الرسالة؟")){
            await deleteDoc(doc(db, "chatMessages", docSnap.id));
          }
        };
        div.appendChild(delBtn);
      }

      chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}
</script>

</body>
  </html>
